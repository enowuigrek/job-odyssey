<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Letter J -->
  <text x="130" y="380" font-family="Arial Black, sans-serif" font-size="320" font-weight="900" fill="#ffffff">J</text>
  <!-- Letter O -->
  <text x="280" y="380" font-family="Arial Black, sans-serif" font-size="320" font-weight="900" fill="#ffffff" fill-opacity="0.7">O</text>
  <!-- Subtle briefcase icon at bottom -->
  <rect x="200" y="420" width="112" height="70" rx="8" fill="#ffffff" fill-opacity="0.3"/>
  <rect x="230" y="408" width="52" height="20" rx="4" fill="#ffffff" fill-opacity="0.3"/>
</svg>
